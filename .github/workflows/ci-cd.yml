name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  backend-functional-test:
    name: Backend Functional Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ vars.POSTGRES_USER }} -d ${{ vars.POSTGRES_DB }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: ${{ vars.APP_NAME }}
      API_PREFIX: ${{ vars.API_PREFIX }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      DATABASE_URL: postgresql+psycopg://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ vars.POSTGRES_DB }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend functional test
        run: pytest tests/test_tasks_api.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:${{ vars.BACKEND_PORT }}
        run: npm run build

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs:
      - backend-functional-test
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat <<EOF > .env.ci
          APP_NAME="${{ vars.APP_NAME }}"
          API_PREFIX="${{ vars.API_PREFIX }}"
          CORS_ORIGINS='${{ vars.CORS_ORIGINS }}'
          POSTGRES_DB="${{ vars.POSTGRES_DB }}"
          POSTGRES_USER="${{ vars.POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          BACKEND_PORT="${{ vars.BACKEND_PORT }}"
          FRONTEND_PORT="${{ vars.FRONTEND_PORT }}"
          EOF

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.ci config

      - name: Build Docker images
        run: docker compose --env-file .env.ci build backend frontend

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - docker-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        id: image_names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/${REPO}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER}/${REPO}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runtime
          push: true
          tags: |
            ${{ steps.image_names.outputs.backend }}:latest
            ${{ steps.image_names.outputs.backend }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=http://localhost:${{ vars.BACKEND_PORT }}
          push: true
          tags: |
            ${{ steps.image_names.outputs.frontend }}:latest
            ${{ steps.image_names.outputs.frontend }}:${{ github.sha }}
